<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AL SUWEIDI ERP</title>
    <!-- Force rebuild v2 -->
    <script>
      // Self-recovery for the "blank white page until I manually refresh" symptom.
      // Cause: after a deploy, a browser/edge sometimes reuses a cached index.html
      // that points at an asset hash the new build renamed, so the bundle 404s and
      // React never mounts. This reloads exactly ONCE (guarded so it can't loop) to
      // pull fresh HTML, turning a dead page into a self-healing one.
      (function () {
        var KEY = 'erp_reload_recovery';
        function recover() {
          if (sessionStorage.getItem(KEY)) return; // already retried this load — don't loop
          sessionStorage.setItem(KEY, String(Date.now()));
          location.reload();
        }
        // Vite emits this when a (pre)loaded module fails to fetch.
        window.addEventListener('vite:preloadError', recover);
        // Resource-load errors don't bubble — listen in the capture phase.
        window.addEventListener(
          'error',
          function (e) {
            var t = e && e.target;
            if (t && (t.tagName === 'SCRIPT' || t.tagName === 'LINK')) recover();
          },
          true,
        );
        // Safety net: React replaces everything inside #root on mount, removing the
        // #boot-loader below. If the loader is STILL there several seconds after
        // load, the bundle never executed — recover once. If it's gone, the app
        // mounted, so clear the guard for future failures.
        window.addEventListener('load', function () {
          setTimeout(function () {
            if (document.getElementById('boot-loader')) recover();
            else sessionStorage.removeItem(KEY);
          }, 8000);
        });
      })();
    </script>
    <style>
      /* Instant, JS-free loading state so a cold first open never shows a blank
         white page while the JS bundle downloads and parses. React unmounts it. */
      #boot-loader {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
        background: #f8fafc;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        color: #475569;
      }
      #boot-loader .bl-spin {
        width: 38px;
        height: 38px;
        border: 3px solid #cbd5e1;
        border-top-color: #0f172a;
        border-radius: 50%;
        animation: bl-rot 0.7s linear infinite;
      }
      #boot-loader .bl-name {
        font-size: 13px;
        letter-spacing: 0.18em;
        font-weight: 600;
        color: #0f172a;
      }
      @keyframes bl-rot {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="boot-loader">
        <div class="bl-name">AL SUWEIDI ERP</div>
        <div class="bl-spin"></div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
